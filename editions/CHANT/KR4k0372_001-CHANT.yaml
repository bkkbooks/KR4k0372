canonical_identifier: bkk:krp/KR4k0372/chant/v1/juan/1
seq: 1
body:
  text: 序先秦已前佚事惟見于世本後世捃摭子傳為書有三皇本紀及路史通鑑外紀諸書皆濫觴于蜀人譙周周書久之與世本俱亡蘇氏轍金氏履祥之反行于世益無足觀矣余嘗惜繹史尚史蒐羅古書之不精不備欲為尚書翼傳以紀唐虞三代之事載明出典未有暇日因撿故友章孝廉所輯古史考一冊略為整理付之剞劂俾考古者有所資焉章孝廉名宗源字逢之以對策博贍中乾隆丙午科舉人好輯佚書欲依隋書經籍志目為之考証所輯書滿十餘笈始欲售之畢督部會楚中有兵事而止時官山東兗沂曹濟道欲購之未果君旋惑于廣慧寺僧素食誦經予告以素食為喪節誦經非先生法言不悔也已而僧以賄敗牽連及君故事斥革科甲應上請故相擅權變亂舊章曰我吏部也去一舉人名易耳君既不得與禮部試意境寥落所館居停厭薄之焚其所授書嘗言吾教學令學徒集十三經中夏殷二代軼禮借為主人燬之矣其篤好古學猶類此迕于嘉慶某年某月某日遺書遂為古書葉君繼雯所得其波及予者十之一二亦無經史要帙此其手定稿之一也嗚呼惜哉嘉慶十一年六用二十一日孫星衍序於安德使署之平津館
